    <rect x="190" y="380" width="330" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.54"/>
    <rect x="190" y="412" width="188" height="42" rx="21" fill="#FFFFFF"/>

    <rect x="192" y="504" width="86" height="16" rx="8" fill="#E4D8FB"/>
