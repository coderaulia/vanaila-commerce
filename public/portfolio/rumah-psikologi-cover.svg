<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6ECE7"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="240" y1="150" x2="980" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E4D8FB"/>
      <stop offset="1" stop-color="#9B7AD9"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1200" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow" x="70" y="100" width="1060" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="22"/>
      <feGaussianBlur stdDeviation="22"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0588235 0 0 0 0 0.0941176 0 0 0 0 0.168627 0 0 0 0.16 0"/>
      <feBlend in2="SourceGraphic" result="shape"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="210" cy="150" r="120" fill="#DCE4DE" filter="url(#blur)"/>
