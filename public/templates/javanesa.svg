<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#F9F5F0"/>

  <!-- Nav -->
  <rect y="0" width="800" height="52" fill="#F9F5F0"/>
  <line x1="0" y1="52" x2="800" y2="52" stroke="#E8DDD2" stroke-width="1"/>
  <!-- Logo -->
  <text x="24" y="34" fill="#2C1810" font-size="16" font-weight="700" letter-spacing="3" font-family="Georgia, serif">JAVANESA</text>
  <!-- Nav links -->
  <text x="280" y="32" fill="#5C4033" font-size="10" font-family="system-ui">Koleksi</text>
  <text x="332" y="32" fill="#5C4033" font-size="10" font-family="system-ui">Tentang</text>
  <text x="386" y="32" fill="#5C4033" font-size="10" font-family="system-ui">Ritual</text>
  <text x="430" y="32" fill="#5C4033" font-size="10" font-family="system-ui">Kontak</text>
  <!-- Icons right -->
  <text x="726" y="33" fill="#5C4033" font-size="14">♡</text>
  <text x="752" y="33" fill="#5C4033" font-size="14">♟</text>

  <!-- Hero split -->
  <!-- Left text side -->
  <text x="40" y="108" fill="#8B5E3C" font-size="10" letter-spacing="4" font-family="system-ui, sans-serif">WARISAN ALAM · JAWA</text>
  <text x="40" y="160" fill="#2C1810" font-size="42" font-weight="700" letter-spacing="-1">Ritual</text>
  <text x="40" y="205" fill="#2C1810" font-size="42" font-weight="700" letter-spacing="-1">Kecantikan</text>
  <text x="40" y="243" fill="#8B5E3C" font-style="italic" font-size="24" font-weight="400">Alami.</text>
  <text x="40" y="278" fill="#6B5744" font-size="11" font-family="system-ui">Diracik dari bahan-bahan terbaik</text>
  <text x="40" y="293" fill="#6B5744" font-size="11" font-family="system-ui">Nusantara untuk kulit sehat bersinar.</text>
  <!-- CTA -->
  <rect x="40" y="314" width="130" height="36" rx="18" fill="#2C1810"/>
  <text x="105" y="336" fill="#F9F5F0" font-size="10" font-weight="600" font-family="system-ui" text-anchor="middle">Jelajahi Koleksi</text>
  <rect x="182" y="314" width="110" height="36" rx="18" fill="none" stroke="#2C1810" stroke-width="1.5"/>
  <text x="237" y="336" fill="#2C1810" font-size="10" font-weight="500" font-family="system-ui" text-anchor="middle">Pelajari Ritual</text>

  <!-- Right image area -->
  <rect x="400" y="60" width="376" height="310" rx="8" fill="#E8DDD2"/>
  <!-- Organic shape overlay -->
  <ellipse cx="588" cy="215" rx="150" ry="150" fill="#C8A882" fill-opacity="0.3"/>
  <ellipse cx="640" cy="180" rx="80" ry="110" fill="#8B5E3C" fill-opacity="0.15"/>
  <!-- Product bottle suggestion -->
  <rect x="548" y="100" width="80" height="160" rx="40" fill="#8B5E3C" fill-opacity="0.6"/>
  <rect x="560" y="90" width="56" height="20" rx="8" fill="#6B4423" fill-opacity="0.7"/>
  <text x="588" y="180" fill="rgba(255,255,255,0.4)" font-size="8" text-anchor="middle" font-family="system-ui">LULUR</text>
  <!-- Second bottle -->
  <rect x="650" y="130" width="60" height="130" rx="30" fill="#A0722A" fill-opacity="0.55"/>
  <rect x="660" y="120" width="40" height="18" rx="7" fill="#8B5E2A" fill-opacity="0.7"/>
  <!-- Leaf deco -->
  <ellipse cx="480" cy="130" rx="28" ry="14" fill="#5A7A4A" fill-opacity="0.6" transform="rotate(-30 480 130)"/>
  <ellipse cx="720" cy="300" rx="22" ry="10" fill="#5A7A4A" fill-opacity="0.5" transform="rotate(20 720 300)"/>

  <!-- Categories strip -->
  <rect y="390" width="800" height="60" fill="#EFE7DC"/>
  <line x1="0" y1="390" x2="800" y2="390" stroke="#DDD0C0" stroke-width="1"/>
  <text x="80" y="415" fill="#2C1810" font-size="12" font-weight="600" text-anchor="middle" font-family="system-ui, sans-serif">Bio-Herbal</text>
  <text x="80" y="430" fill="#8B5E3C" font-size="9" text-anchor="middle" font-family="system-ui">12 Items</text>
  <line x1="160" y1="400" x2="160" y2="440" stroke="#DDD0C0" stroke-width="1"/>
  <text x="240" y="415" fill="#2C1810" font-size="12" font-weight="600" text-anchor="middle" font-family="system-ui">Perawatan Wajah</text>
  <text x="240" y="430" fill="#8B5E3C" font-size="9" text-anchor="middle" font-family="system-ui">8 Items</text>
  <line x1="320" y1="400" x2="320" y2="440" stroke="#DDD0C0" stroke-width="1"/>
  <text x="400" y="415" fill="#2C1810" font-size="12" font-weight="600" text-anchor="middle" font-family="system-ui">Tubuh</text>
  <text x="400" y="430" fill="#8B5E3C" font-size="9" text-anchor="middle" font-family="system-ui">15 Items</text>
  <line x1="480" y1="400" x2="480" y2="440" stroke="#DDD0C0" stroke-width="1"/>
  <text x="560" y="415" fill="#2C1810" font-size="12" font-weight="600" text-anchor="middle" font-family="system-ui">Rambut</text>
  <text x="560" y="430" fill="#8B5E3C" font-size="9" text-anchor="middle" font-family="system-ui">6 Items</text>
  <line x1="640" y1="400" x2="640" y2="440" stroke="#DDD0C0" stroke-width="1"/>
  <text x="720" y="415" fill="#2C1810" font-size="12" font-weight="600" text-anchor="middle" font-family="system-ui">Gift Set</text>
  <text x="720" y="430" fill="#8B5E3C" font-size="9" text-anchor="middle" font-family="system-ui">4 Items</text>

  <!-- Footer hint -->
  <rect y="450" width="800" height="50" fill="#2C1810"/>
  <text x="400" y="473" fill="rgba(255,255,255,0.6)" font-size="9" text-anchor="middle" font-family="system-ui">JAVANESA · Kecantikan dari Bumi Jawa · since 2018</text>
  <text x="400" y="489" fill="rgba(255,255,255,0.3)" font-size="8" text-anchor="middle" font-family="system-ui">Koleksi · Ritual · Tentang · Kontak</text>
</svg>
