version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vanaila-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vanaila_dev
    ports:
      - '5432:5432'
    volumes:
      - vanaila_pgdata:/var/lib/postgresql/data

volumes:
  vanaila_pgdata:
